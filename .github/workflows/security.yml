name: Security scans

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Weekly catch-all for newly disclosed CVEs
    - cron: "13 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # OSV catches CVEs in transitive deps. Install the binary directly and
  # always-write SARIF + a tabular summary, even when nothing is found
  # (so the SARIF upload never trips on a missing file).
  osv-scan:
    name: OSV Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install OSV-Scanner
        run: |
          curl -sSL -o osv-scanner \
            https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64
          chmod +x osv-scanner

      - name: Run OSV-Scanner (SARIF)
        run: |
          ./osv-scanner --format=sarif --output=osv-results.sarif \
            --lockfile=Frontend/pnpm-lock.yaml || true
          # Make sure the file always exists, even when no vulns are found
          # — upload-sarif would otherwise fail with "Path does not exist".
          if [ ! -s osv-results.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"osv-scanner","informationUri":"https://github.com/google/osv-scanner"}},"results":[]}]}' > osv-results.sarif
          fi

      - name: Run OSV-Scanner (table for the log)
        run: ./osv-scanner --lockfile=Frontend/pnpm-lock.yaml || true

      - name: Upload OSV results to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner

  trivy-fs:
    name: Trivy (filesystem + IaC)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Trivy in fs mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"

      - name: Upload Trivy results to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

  trivy-config:
    name: Trivy (workflow misconfig)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Trivy in config mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH,MEDIUM
          format: sarif
          output: trivy-config.sarif
          exit-code: "0"

      - name: Upload Trivy config results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config
