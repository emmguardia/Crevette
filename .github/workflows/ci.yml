name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: Frontend

env:
  HUSKY: 0

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: Frontend/package.json
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: Frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Prettier check
        run: pnpm format:check

  test:
    name: Test (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: Frontend/package.json
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: Frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: Frontend/coverage
          retention-days: 7
          if-no-files-found: ignore

  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: Frontend/package.json
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: Frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Audit (informational only)
        run: pnpm audit --prod --audit-level=high || true

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Bundle size budget
        run: pnpm size

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: Frontend/dist
          retention-days: 7
          if-no-files-found: error
