<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Redirection… — Quianne</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <!-- GitHub Pages SPA hack: store the requested path and bounce to /
         so the React Router can pick it up. -->
    <script>
      (function () {
        var path = window.location.pathname + window.location.search + window.location.hash;
        try { sessionStorage.setItem('spa-redirect', path); } catch (_) {}
        window.location.replace('/');
      })();
    </script>
    <meta http-equiv="refresh" content="0; url=/" />
    <style>body{background:#050507;color:#e5e5ea;font-family:system-ui,sans-serif;text-align:center;padding:4rem}</style>
  </head>
  <body>
    Redirection…
  </body>
</html>
